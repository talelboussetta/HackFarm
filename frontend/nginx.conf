server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    # Forward API calls to backend service
    location /api/ {
        proxy_pass https://hackfarmer-api-068ef9cd2e06.herokuapp.com/api/;
        proxy_http_version 1.1;
        proxy_set_header Host hackfarmer-api-068ef9cd2e06.herokuapp.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve static assets with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|webm|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
