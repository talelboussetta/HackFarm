name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ruff
        run: pip install ruff
      - name: Lint backend
        run: ruff check backend/src --output-format=github
      - name: Import check
        run: python -c "import sys; sys.path.insert(0, 'backend'); import src.api.main; print('Import OK')"

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_APPWRITE_ENDPOINT: https://cloud.appwrite.io/v1
          VITE_APPWRITE_PROJECT_ID: ${{ secrets.VITE_APPWRITE_PROJECT_ID }}
          VITE_SENTRY_DSN: ""
          VITE_COMMIT_SHA: ${{ github.sha }}
        run: npm run build
      - name: Verify dist
        run: test -d frontend/dist && echo "dist OK" || (echo "dist MISSING" && exit 1)
