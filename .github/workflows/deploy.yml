name: Deploy HackFarmer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run backend tests
        run: python -m pytest test_backend_routes.py -v --tb=short

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate frontend build
        working-directory: frontend
        run: npm ci && npm run build

  backend:
    name: Deploy Backend to Heroku
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Set Heroku config vars
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          heroku config:set \
            PYTHON_VERSION=3.11.7 \
            APPWRITE_ENDPOINT=${{ secrets.APPWRITE_ENDPOINT }} \
            APPWRITE_PROJECT_ID=${{ secrets.APPWRITE_PROJECT_ID }} \
            APPWRITE_API_KEY=${{ secrets.APPWRITE_API_KEY }} \
            FERNET_KEY=${{ secrets.FERNET_KEY }} \
            FRONTEND_URL=${{ secrets.FRONTEND_URL }} \
            --app hackfarmer-api

      - uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: hackfarmer-api
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          appdir: backend

  frontend:
    name: Deploy Frontend
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install & Build
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Deploy to Appwrite Sites
        working-directory: frontend
        run: |
          npm install -g appwrite-cli
          appwrite login --endpoint ${{ secrets.APPWRITE_ENDPOINT }} --project ${{ secrets.APPWRITE_PROJECT_ID }} --key ${{ secrets.APPWRITE_API_KEY }}
          appwrite deploy site --siteId ${{ secrets.APPWRITE_SITE_ID }} --path dist/

