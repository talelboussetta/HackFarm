name: Deploy HackFarmer

on:
  push:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ruff
        run: pip install ruff
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Lint backend
        run: ruff check backend/src --output-format=github
      - name: Import check
        run: python -c "import sys; sys.path.insert(0, 'backend'); import src.api.main; print('Import OK')"

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: [backend-lint]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # Frontend Build
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_APPWRITE_ENDPOINT: https://cloud.appwrite.io/v1
          VITE_APPWRITE_PROJECT_ID: ${{ secrets.VITE_APPWRITE_PROJECT_ID }}
          VITE_APPWRITE_DATABASE_ID: "hackfarmer-db"
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_COMMIT_SHA: ${{ github.sha }}
        run: npm run build
      - name: Move frontend to backend
        run: |
          mkdir -p backend/frontend
          cp -r frontend/dist backend/frontend/dist

      # Deploy
      - name: Deploy to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
        run: |
          # Setup Heroku git remote
          git config --global user.email "deploy@github.com"
          git config --global user.name "GitHub Actions"
          cat > ~/.netrc <<EOF
          machine git.heroku.com
            login $HEROKU_EMAIL
            password $HEROKU_API_KEY
          EOF
          
          # Add backend files that were just generated (frontend/dist)
          if [ -d "backend/frontend/dist" ]; then
            git add -f backend/frontend/dist
            git commit -m "Deploy: add frontend build artifacts" || echo "Nothing to commit"
          else
            echo "Warning: backend/frontend/dist not found"
          fi
          
          # Push only the backend subtree to Heroku main
          # We use --force because every subtree split creates a new history
          # We use HEAD as source to include the frontend build artifacts commit we just made
          
          echo "Splitting subtree..."
          SPLIT_SHA=$(git subtree split --prefix backend HEAD)
          echo "Split SHA: $SPLIT_SHA"
          
          echo "Pushing to Heroku..."
          # Authentication is handled by .netrc created above
          # Strip hidden whitespaces/newlines from the app name which causes git url errors
          HEROKU_APP_NAME=$(echo "$HEROKU_APP_NAME" | tr -d '\n' | tr -d '\r')
          # Export to GITHUB_ENV so subsequent steps use the sanitized value
          echo "HEROKU_APP_NAME=$HEROKU_APP_NAME" >> $GITHUB_ENV
          
          git push "https://git.heroku.com/${HEROKU_APP_NAME}.git" $SPLIT_SHA:refs/heads/main --force
      - name: Heroku logs on failure
        if: failure()
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          npm install -g heroku
          heroku logs --app $HEROKU_APP_NAME --num 100
      - name: Health check
        if: success()
        run: |
          sleep 20
          # Use the sanitized env var, not the raw secret
          curl -f "https://$HEROKU_APP_NAME.herokuapp.com/health" \
            -H "Accept: application/json" \
            --retry 3 --retry-delay 5 \
            || (echo "Health check failed after deploy" && exit 1)
          echo "Deploy healthy"
      - name: Release URL
        run: |
          echo "Deployed: https://$HEROKU_APP_NAME.herokuapp.com"
