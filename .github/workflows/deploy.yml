name: Deploy HackFarmer

on:
  push:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ruff
        run: pip install ruff
      - name: Lint backend
        run: ruff check backend/src --output-format=github
      - name: Import check
        run: python -c "import sys; sys.path.insert(0, 'backend'); import src.api.main; print('Import OK')"

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: [backend-lint]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # Frontend Build
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_APPWRITE_ENDPOINT: https://cloud.appwrite.io/v1
          VITE_APPWRITE_PROJECT_ID: ${{ secrets.VITE_APPWRITE_PROJECT_ID }}
          VITE_APPWRITE_DATABASE_ID: "hackfarmer-db"
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_COMMIT_SHA: ${{ github.sha }}
        run: npm run build
      - name: Move frontend to backend
        run: |
          mkdir -p backend/frontend
          cp -r frontend/dist backend/frontend/dist

      # Deploy
      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          appdir: backend
          procfile_exists: true
      - name: Health check
        run: |
          sleep 20
          curl -f https://${{ secrets.HEROKU_APP_NAME }}.herokuapp.com/health \
            -H "Accept: application/json" \
            --retry 3 --retry-delay 5 \
            || (echo "Health check failed after deploy" && exit 1)
          echo "Deploy healthy"
      - name: Release URL
        run: echo "Deployed: https://${{ secrets.HEROKU_APP_NAME }}.herokuapp.com"
