# Production Docker Compose override
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod   # multi-stage nginx build
    ports:
      - "80:80"
    volumes: []                     # no volume mounts in prod
    command: []                     # nginx handles it
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  backend:
    volumes: []                     # no hot-reload mount in prod
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --workers 2
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

  n8n:
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
